<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Voxi Debug</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
    h1 { color: #7cf; }
    button { padding: 0.5rem 1.5rem; margin: 0.25rem; cursor: pointer; border: none; border-radius: 4px; font-size: 1rem; }
    #startBtn { background: #2a7; color: #fff; }
    #stopBtn  { background: #c33; color: #fff; }
    #status   { color: #fa0; margin: 0.5rem 0; min-height: 1.2em; }
    #log      { background: #222; border: 1px solid #444; padding: 1rem; height: 400px; overflow-y: auto; }
    .mic { color: #7cf; }
    .tab { color: #fa0; }
    .err { color: #f55; }
    .info { color: #888; }
  </style>
</head>
<body>
  <h1>Voxi Debug (no extension)</h1>
  <div>
    <button id="startBtn">▶ 開始</button>
    <button id="stopBtn" disabled>■ 停止</button>
  </div>
  <div id="status">待機中</div>
  <div id="log"></div>
  <script type="module" src="./debug.js"></script>
</body>
</html>
